  <style>
    :root {
      --color-bg: #ffffff;
      --color-text-main: #2b2b2b;
      --color-text-muted: #5e5e5e;
      --color-primary-dark: #111111;
      --color-border: #e0e0e0;
      --radius-lg: 16px;
      --font-family: 'Google Sans', 'Google Sans Flex', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--color-bg);
      color: var(--color-text-main);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .app-container {
      max-width: 1050px;
      margin: 0 auto;
      padding: 0 24px;
      padding-bottom: 20vh;
    }

    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 32px 0;
      border-bottom: 1px solid var(--color-border);
      margin-bottom: 48px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-primary-dark);
      letter-spacing: -0.02em;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 24px;
    }

    .nav-link {
      text-decoration: none;
      color: var(--color-text-muted);
      font-weight: 500;
      font-size: 1.15rem;
      transition: var(--transition);
      padding-bottom: 4px;
    }

    .nav-link.active {
      color: var(--color-text-main);
      font-weight: 700;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .page-title {
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 48px;
      color: var(--color-text-main);
    }

    .typewriter-text::after {
      content: '|';
      display: inline-block;
      margin-left: 4px;
      opacity: 1;
      animation: blinkCursor 0.8s step-end infinite;
    }

    @keyframes blinkCursor {
      0%,
      100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .sub-tabs {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 48px;
    }

    .sub-tab {
      background: none;
      border: none;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--color-text-muted);
      cursor: pointer;
      padding: 12px 24px;
      transition: var(--transition);
      font-family: var(--font-family);
    }

    .sub-tab.active {
      color: var(--color-text-main);
      font-weight: 700;
    }
  </style>
